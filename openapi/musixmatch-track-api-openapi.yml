                          status_code:
                            type: number
                            description: ''
                          execute_time:
                            type: number
                            description: ''
                      body:
                        type: object
                        properties:
                          track_list:
                            type: array
                            description: A list of tracks
                            items:
                              type: object
                              properties:
                                track:
                                  $ref: '#/components/schemas/Track'
