      - name: q_artist
        in: query
        description: The song artist
        schema:
          type: string
      - name: q_track
        in: query
        description: The song title
        schema:
          type: string
      - name: f_has_lyrics
        in: query
        description: When set, filter only contents with lyrics
        schema:
          type: number
      - name: f_has_subtitle
        in: query
        description: When set, filter only contents with subtitles
        schema:
          type: number
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      header:
