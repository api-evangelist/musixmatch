                          status_code:
                            type: number
                            description: ''
                          execute_time:
                            type: number
                            description: ''
                      body:
                        type: object
                        properties:
                          track_list:
                            type: array
                            description: A list of tracks
                            items:
                              type: object
                              properties:
                                track:
                                  $ref: '#/components/schemas/Track'
      security:
      - key: []
  /chart.tracks.get:
    get:
      tags:
      - Track
      parameters:
      - name: format
        in: query
        description: 'output format: json, jsonp, xml.'
        schema:
          type: string
          default: json
      - name: callback
        in: query
        description: jsonp callback
        schema:
          type: string
      - name: page
        in: query
        description: Define the page number for paginated results
        schema:
          type: number
      - name: page_size
        in: query
        description: Define the page size for paginated results.Range is 1 to 100.
        schema:
          type: number
      - name: country
        in: query
        description: A valid ISO 3166 country code
        schema:
          type: string
          default: us
      - name: f_has_lyrics
        in: query
        description: When set, filter only contents with lyrics
        schema:
          type: string
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      header:
                        type: object
                        properties:
                          available:
