openapi: 3.0.1
info:
  title: Musixmatch Album Track API
  description: '

    The most powerful and legal way to display lyrics on your website or in

    your application. Musixmatch lyrics API is a robust service that permits

    you to search and retrieve lyrics in the simplest possible way.'
  termsOfService: http://musixmatch.com/apiterms/
  contact:
    name: Musixmatch
    url: https://musixmatch.com
    email: info@musixmatch.com
  license:
    name: MIT
    url: http://opensource.org/licenses/MIT
  version: 1.1.0
servers:
- url: https://api.musixmatch.com/ws/1.1
security:
- key: []
tags:
- name: Track
  description: ''
paths:
  /album.tracks.get:
    get:
      tags:
      - Track
      parameters:
      - name: format
        in: query
        description: 'output format: json, jsonp, xml.'
        schema:
          type: string
          default: json
      - name: callback
        in: query
        description: jsonp callback
        schema:
          type: string
      - name: album_id
        in: query
        description: The musiXmatch album id
        required: true
        schema:
          type: string
      - name: f_has_lyrics
        in: query
        description: When set, filter only contents with lyrics
        schema:
          type: string
      - name: page
        in: query
        description: Define the page number for paginated results
        schema:
          type: number
      - name: page_size
        in: query
        description: Define the page size for paginated results.Range is 1 to 100.
        schema:
          type: number
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      header:
                        type: object
                        properties:
                          status_code:
                            type: number
                            description: ''
                          available:
                            type: number
                            description: ''
                          execute_time:
                            type: number
                            description: ''
                      body:
                        type: object
                        properties:
                          track_list:
                            type: array
                            description: A list of tracks
                            items:
                              $ref: '#/components/schemas/Track'
      security:
      - key: []
  /matcher.track.get:
    get:
      tags:
      - Track
      parameters:
      - name: format
