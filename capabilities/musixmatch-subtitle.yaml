    resources:
    - name: matcher.subtitle.get
      path: /matcher.subtitle.get
      operations:
      - name: get
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
          description: 'output format: json, jsonp, xml.'
        - name: callback
          in: query
          type: string
          description: jsonp callback
        - name: q_track
          in: query
          type: string
          description: The song title
        - name: q_artist
          in: query
          type: string
          description: The song artist
        - name: f_subtitle_length
          in: query
          type: number
          description: Filter by subtitle length in seconds
        - name: f_subtitle_length_max_deviation
          in: query
          type: number
          description: Max deviation for a subtitle length in seconds
