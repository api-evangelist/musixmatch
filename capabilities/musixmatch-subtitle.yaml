naftiko: 1.0.0-alpha2
info:
  label: Musixmatch API — Subtitle
  description: 'Musixmatch API — Subtitle. 2 operations. Lead operation: Subtitle. Self-contained Naftiko capability covering
    one Musixmatch business surface.'
  tags:
